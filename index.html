<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bonio Boost — Photo Booth</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@500;600;700&family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/3.24.0/tabler-icons.min.css" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  :root{
    --ink:#f3f0ff;--ink-dim:rgba(243,240,255,.72);--ink-faint:rgba(243,240,255,.45);
    --accent:#7aa8ff;--pink:#ff5c9a;--coral:#ff8a5c;--yellow:#ffcf5c;--mint:#5eead4;--sky:#5fc7ff;
    --glass:rgba(255,255,255,.08);--glass-2:rgba(255,255,255,.14);--stroke:rgba(255,255,255,.20);--stroke-soft:rgba(255,255,255,.11);
  }
  html,body{height:100%;}
  body{font-family:"Prompt","Noto Sans Thai",system-ui,sans-serif;color:var(--ink);height:100%;overflow:hidden;background:#09091a;-webkit-font-smoothing:antialiased;}
  .bg{position:fixed;inset:0;z-index:0;overflow:hidden;
    background:radial-gradient(1200px 820px at 14% 8%,#1e2f66 0%,transparent 55%),
      radial-gradient(1050px 900px at 92% 16%,#0f4a63 0%,transparent 55%),
      radial-gradient(1150px 950px at 70% 98%,#241f5e 0%,transparent 55%),
      linear-gradient(160deg,#0a0c20 0%,#0d1230 60%,#090a1a 100%);}
  .orb{position:fixed;border-radius:50%;filter:blur(70px);opacity:.4;mix-blend-mode:screen;z-index:0;animation:float 22s ease-in-out infinite;}
  .orb.a{width:360px;height:360px;background:#5b7fe0;top:-70px;left:8%;}
  .orb.b{width:320px;height:320px;background:#29a8cf;top:26%;right:5%;animation-delay:-7s;}
  .orb.c{width:380px;height:380px;background:#5566cf;bottom:-90px;left:36%;animation-delay:-13s;}
  @keyframes float{0%,100%{transform:translate(0,0) scale(1);}33%{transform:translate(30px,-24px) scale(1.05);}66%{transform:translate(-22px,18px) scale(.96);}}

  .wrap{position:relative;z-index:1;height:100vh;overflow:hidden;display:flex;align-items:center;justify-content:center;padding:18px;}

  .device{border-radius:40px;padding:16px;position:relative;background:linear-gradient(150deg,rgba(34,28,66,.7),rgba(14,12,34,.7));
    box-shadow:0 34px 80px rgba(0,0,0,.55),inset 0 0 0 1px rgba(255,255,255,.08);
    transition:width .42s cubic-bezier(.4,0,.2,1),height .42s cubic-bezier(.4,0,.2,1);}
  .device::after{content:"";position:absolute;border-radius:50%;background:rgba(255,255,255,.3);box-shadow:0 0 0 3px rgba(0,0,0,.25);}
  .device.portrait::after{width:9px;height:9px;top:9px;left:50%;transform:translateX(-50%);}
  .device.landscape::after{width:9px;height:9px;left:9px;top:50%;transform:translateY(-50%);}
  .screen{width:100%;height:100%;border-radius:26px;overflow:hidden;position:relative;background:#0a0a1e;border:1px solid var(--stroke-soft);font-size:16px;}
  .liquid{position:absolute;inset:0;z-index:0;overflow:hidden;background:#0a0a1e;animation:hue 9s linear infinite;}
  .liquid .b{position:absolute;width:72%;height:72%;border-radius:50%;filter:blur(46px);mix-blend-mode:screen;opacity:.9;}
  .liquid .b1{background:#2b5bff;top:-16%;left:-12%;animation:mA 10s ease-in-out infinite;}
  .liquid .b2{background:#00d0ff;top:14%;right:-22%;animation:mB 12s ease-in-out infinite;}
  .liquid .b3{background:#7a2bff;bottom:-22%;left:2%;animation:mC 11s ease-in-out infinite;}
  .liquid .b4{background:#ff2d95;bottom:-14%;right:-8%;animation:mD 13s ease-in-out infinite;}
  .liquid .b5{background:#00ffc3;top:26%;left:22%;width:56%;height:56%;animation:mE 9s ease-in-out infinite;}
  .scr{position:absolute;inset:0;z-index:1;display:flex;flex-direction:column;background:linear-gradient(180deg,rgba(6,6,18,.46),rgba(6,6,18,.6));}
  .scr.land{background:linear-gradient(180deg,rgba(6,6,18,.12),rgba(6,6,18,.32));}
  @keyframes hue{to{filter:hue-rotate(360deg);}}
  @keyframes mA{0%,100%{transform:translate(0,0) scale(1);}50%{transform:translate(26%,22%) scale(1.22);}}
  @keyframes mB{0%,100%{transform:translate(0,0) scale(1.1);}50%{transform:translate(-24%,18%) scale(.85);}}
  @keyframes mC{0%,100%{transform:translate(0,0) scale(1);}50%{transform:translate(20%,-20%) scale(1.28);}}
  @keyframes mD{0%,100%{transform:translate(0,0) scale(1.05);}50%{transform:translate(-18%,-16%) scale(.9);}}
  @keyframes mE{0%,100%{transform:translate(0,0) scale(1);}50%{transform:translate(-22%,24%) scale(1.2);}}

  .scr-prog{height:4px;background:rgba(255,255,255,.08);flex:0 0 auto;}
  .scr-prog b{display:block;height:100%;background:linear-gradient(90deg,var(--accent),#56c8e0);transition:width .4s;border-radius:0 4px 4px 0;box-shadow:0 0 10px rgba(122,168,255,.55);}
  .scr-top{display:flex;align-items:center;justify-content:space-between;padding:.7em 1.2em .2em;font-size:.72em;color:var(--ink-dim);flex:0 0 auto;}
  .scr-top .l{display:flex;align-items:center;gap:.4em;font-weight:600;color:var(--ink);font-family:"Kanit",sans-serif;letter-spacing:.3px;}
  .scr-top .r{display:flex;align-items:center;gap:.5em;}
  .backbtn{font-family:inherit;cursor:pointer;border:1px solid var(--stroke);background:rgba(255,255,255,.14);color:var(--ink);width:1.9em;height:1.9em;border-radius:50%;display:inline-grid;place-items:center;font-size:1.4em;margin-right:.15em;}
  .backbtn:active{transform:scale(.94);}
  .scr-body{flex:1 1 auto;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.5em;padding:.7em 1.3em .9em;text-align:center;overflow:hidden;min-height:0;}
  .scr-main{flex:1 1 auto;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.7em;width:100%;min-height:0;overflow-y:auto;text-align:center;}
  .scr-main::-webkit-scrollbar{width:0;}
  .scr-cta{flex:0 0 auto;display:flex;gap:.6em;justify-content:center;align-items:center;width:100%;flex-wrap:wrap;padding-top:.2em;}
  .scr-cta .btn.lg{min-width:11em;}
  .scr-body::-webkit-scrollbar{width:0;height:0;}
  .scr-foot{flex:0 0 auto;padding:.5em 1.2em .85em;color:var(--ink-faint);font-size:.74em;text-align:center;display:flex;align-items:center;justify-content:center;gap:.4em;}

  .h1{font-family:"Kanit",sans-serif;font-weight:600;font-size:1.75em;line-height:1.2;letter-spacing:.2px;text-shadow:0 2px 16px rgba(0,0,0,.6);}
  .h2{font-family:"Kanit",sans-serif;font-weight:600;font-size:1.3em;line-height:1.22;letter-spacing:.2px;text-shadow:0 2px 16px rgba(0,0,0,.6);}
  .sub{color:#e9e6ff;font-size:.92em;line-height:1.5;font-weight:400;text-shadow:0 1px 12px rgba(0,0,0,.55);}
  .hero{line-height:1;}
  .hero .big{font-size:4em;filter:drop-shadow(0 10px 22px rgba(179,157,255,.4));}

  .landing{position:relative;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1em;cursor:pointer;padding:1em;}
  .lcenter{display:flex;flex-direction:column;align-items:center;gap:1em;}
  .aper{position:relative;width:6.6em;height:6.6em;display:grid;place-items:center;}
  .aper .ring{position:absolute;width:100%;height:100%;border-radius:50%;border:2px solid var(--accent);opacity:0;animation:ringpulse 4s ease-out infinite;}
  .aper .ring.r2{animation-delay:2s;}
  .aperblades{width:100%;height:100%;animation:breathe 6s ease-in-out infinite;}
  .aperblades .dash{transform-origin:60px 60px;animation:spinslow 22s linear infinite;}
  .touch{font-family:"Kanit",sans-serif;font-weight:700;font-size:2.1em;color:#fff;letter-spacing:.02em;text-shadow:0 2px 26px rgba(0,0,0,.6);animation:softpulse 3.4s ease-in-out infinite;}
  .touch-en{font-family:"Kanit",sans-serif;font-weight:500;font-size:.8em;letter-spacing:.44em;color:rgba(255,255,255,.8);padding-left:.44em;margin-top:.15em;text-shadow:0 2px 16px rgba(0,0,0,.5);}
  .brandmark{position:absolute;bottom:1.6em;font-family:"Kanit",sans-serif;font-weight:600;font-size:1em;letter-spacing:.22em;padding-left:.22em;
    color:rgba(255,255,255,.9);text-shadow:0 2px 16px rgba(0,0,0,.6);}
  @keyframes spinslow{to{transform:rotate(360deg);}}
  @keyframes breathe{0%,100%{transform:scale(1);}50%{transform:scale(1.03);}}
  @keyframes sheenslow{to{background-position:200% center;}}
  @keyframes softpulse{0%,100%{opacity:.7;}50%{opacity:1;}}
  @keyframes ringpulse{0%{transform:scale(.9);opacity:.5;}70%{transform:scale(1.25);opacity:0;}100%{opacity:0;}}

  .btn{font-family:"Kanit",sans-serif;cursor:pointer;border:1px solid var(--stroke);background:var(--glass-2);color:var(--ink);
    padding:0 1.2em;border-radius:999px;font-size:.95em;font-weight:500;transition:transform .12s,background .2s,box-shadow .2s;white-space:nowrap;
    backdrop-filter:blur(8px);display:inline-flex;align-items:center;gap:.4em;justify-content:center;min-height:2.6em;}
  .btn i{font-size:1.05em;}
  .btn:hover{background:rgba(255,255,255,.2);}
  .btn:active{transform:scale(.97);}
  .btn.primary{background:linear-gradient(135deg,#3f74d6,#79b0ff);color:#fff;border-color:transparent;box-shadow:0 8px 22px rgba(60,110,200,.4);}
  .btn.primary:hover{filter:brightness(1.05);}
  .btn.ghost{background:transparent;border-color:var(--stroke-soft);color:var(--ink-dim);}
  .btn.lg{padding:0 1.5em;font-size:1em;min-height:2.8em;}
  .btn-row{display:flex;gap:.6em;flex-wrap:nowrap;justify-content:center;}

  .pill{display:inline-flex;align-items:center;gap:.4em;padding:.5em 1.05em;border-radius:999px;background:var(--glass);border:1px solid var(--stroke-soft);font-size:.94em;color:var(--ink-dim);font-weight:500;}
  .pill.price{background:rgba(255,207,92,.16);border-color:rgba(255,207,92,.4);color:#ffdf9e;}
  .pill.free{background:rgba(94,234,212,.16);border-color:rgba(94,234,212,.4);color:#b6fff0;}

  .frames{display:grid;gap:.8em;width:100%;}
  .device.portrait .frames{grid-template-columns:repeat(2,1fr);}
  .device.landscape .frames{grid-template-columns:repeat(4,1fr);}
  .fcard{cursor:pointer;border-radius:1.1em;padding:.85em .7em;background:var(--glass);border:1px solid var(--stroke-soft);
    display:flex;flex-direction:column;align-items:center;gap:.55em;transition:transform .14s,border-color .2s,background .2s;}
  .fcard:hover{transform:translateY(-4px);background:var(--glass-2);border-color:var(--stroke);}
  .fcard:active{transform:translateY(0);}
  .mini{background:#fff;border-radius:.5em;padding:.34em;display:grid;gap:.26em;box-shadow:0 8px 20px rgba(0,0,0,.42);position:relative;}
  .mini i{border-radius:.26em;background-size:cover;background-position:center;box-shadow:inset 0 0 0 1px rgba(0,0,0,.1);}
  .subcaps{font-family:"Kanit",sans-serif;font-weight:500;font-size:.76em;letter-spacing:.28em;color:var(--ink-faint);margin-top:-.3em;}
  .frame-strip{display:flex;gap:1.1em;overflow-x:auto;width:100%;padding:.8em .3em .9em;align-items:flex-start;}
  .frame-strip::-webkit-scrollbar{height:6px;}
  .frame-strip::-webkit-scrollbar-thumb{background:rgba(255,255,255,.28);border-radius:3px;}
  .frame-thumb{position:relative;cursor:pointer;flex:0 0 auto;padding:.25em;border-radius:.6em;transition:.15s;}
  .frame-thumb.on{background:rgba(122,168,255,.14);outline:2px solid var(--accent);}
  .frame-thumb .fcheck{position:absolute;top:-.35em;left:-.35em;width:1.5em;height:1.5em;border-radius:50%;background:var(--accent);color:#0a0a1e;display:none;place-items:center;font-size:.9em;z-index:3;box-shadow:0 2px 6px rgba(0,0,0,.4);}
  .frame-thumb.on .fcheck{display:grid;}
  .frame-hero{display:flex;align-items:center;justify-content:center;padding:.3em 0 .6em;flex:0 0 auto;}
  .frameart{position:relative;background-size:100% 100%;background-repeat:no-repeat;border-radius:.2em;box-shadow:0 12px 28px rgba(0,0,0,.5);overflow:hidden;}
  .fa-photo{position:absolute;background-size:cover;background-position:center;}
  .fgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:.7em;width:100%;padding:.1em;}
  .device.landscape .fgrid{grid-template-columns:repeat(6,1fr);gap:.55em;}
  .fgrid-wrap{flex:1 1 auto;display:flex;align-items:center;justify-content:center;width:100%;min-height:0;}
  .fcard2{background:var(--glass);border:1.5px solid var(--stroke-soft);border-radius:.9em;padding:.7em .4em .55em;display:flex;flex-direction:column;align-items:center;gap:.4em;cursor:pointer;position:relative;transition:transform .12s,border-color .2s,background .2s;}
  .fcard2:active{transform:scale(.96);}
  .fcard2.on{border-color:var(--accent);background:rgba(122,168,255,.16);box-shadow:0 0 0 1px var(--accent);}
  .fcard2-art{display:flex;align-items:center;justify-content:center;}
  .fcard2 .fname{font-family:"Kanit",sans-serif;font-size:.8em;color:var(--ink-dim);}
  .fcard2.on .fname{color:#fff;}
  .fcard2 .fcheck{position:absolute;top:-.4em;right:-.4em;width:1.5em;height:1.5em;border-radius:50%;background:var(--accent);color:#0a0a1e;display:none;place-items:center;font-size:.9em;z-index:3;box-shadow:0 2px 6px rgba(0,0,0,.4);}
  .fcard2.on .fcheck{display:grid;}
  .fname{font-family:"Kanit",sans-serif;font-size:1em;font-weight:500;}
  .fshots{font-size:.76em;color:var(--ink-faint);}

  .cam{width:17em;max-width:100%;aspect-ratio:4/3;flex:0 0 auto;border-radius:1.3em;position:relative;overflow:hidden;background:#160b1f;
    box-shadow:inset 0 0 0 1px var(--stroke-soft),0 14px 34px rgba(0,0,0,.4);}
  .camfill{position:absolute;inset:0;background-color:#160b1f;}
  .camvideo{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transform:scaleX(-1);}
  .cambadge{position:absolute;top:.7em;left:.85em;font-size:.72em;color:#fff;display:flex;align-items:center;gap:.35em;background:rgba(0,0,0,.4);padding:.28em .6em;border-radius:999px;z-index:3;}
  .cambadge .rec{width:.5em;height:.5em;border-radius:50%;background:#ff4d6a;animation:blink 1s infinite;}
  @keyframes blink{50%{opacity:.25;}}
  .countbubble{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:2.7em;height:2.7em;border-radius:50%;
    display:grid;place-items:center;background:rgba(255,255,255,.18);backdrop-filter:blur(5px);border:.12em solid rgba(255,255,255,.7);z-index:3;}
  .countbubble span{font-family:"Kanit",sans-serif;font-weight:600;font-size:1.55em;color:#fff;}
  .flashwhite{position:absolute;inset:0;background:#fff;animation:flash .3s ease-out;z-index:5;}
  @keyframes flash{from{opacity:.95;}to{opacity:0;}}
  .camcheck{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:1.9em;height:1.9em;border-radius:50%;background:var(--mint);display:grid;place-items:center;color:#053b32;font-size:1.4em;z-index:4;box-shadow:0 6px 16px rgba(0,0,0,.4);}
  .shotthumbs{display:flex;gap:.4em;flex-wrap:wrap;justify-content:center;}
  .sthumb{width:2.1em;height:2.1em;border-radius:.55em;border:1px solid var(--stroke-soft);background-size:cover;background-position:center;}
  .sthumb.empty{background:rgba(255,255,255,.07);}

  .photo{background:#fff;border-radius:.6em;padding:.5em .5em .8em;box-shadow:0 16px 40px rgba(0,0,0,.5);display:inline-flex;flex-direction:column;gap:.4em;position:relative;transform:rotate(-2deg);}
  .photo .cells{display:grid;gap:.32em;}
  .photo .cells b{border-radius:.3em;display:block;background-size:cover;background-position:center;box-shadow:inset 0 0 0 1px rgba(0,0,0,.06);}
  .photo .cap{font-family:"Kanit",sans-serif;font-weight:600;font-size:.78em;color:#8b5cf6;text-align:center;letter-spacing:.04em;}
  .photo .sticker{position:absolute;font-size:1.5em;filter:drop-shadow(0 3px 5px rgba(0,0,0,.25));}
  .photo .st1{top:-.4em;right:-.3em;transform:rotate(12deg);}
  .photo .st2{bottom:.3em;left:-.4em;transform:rotate(-10deg);}

  .filters{display:flex;gap:.5em;flex-wrap:wrap;justify-content:center;}
  .fchip{cursor:pointer;padding:.5em 1.05em;border-radius:999px;font-size:.92em;background:var(--glass);border:1px solid var(--stroke-soft);color:var(--ink-dim);transition:.15s;font-weight:500;}
  .fchip.on{background:#fff;color:#1a1030;border-color:transparent;}
  .preview-wrap{display:flex;gap:1em;align-items:center;justify-content:center;width:100%;}
  .preview-photo{flex:0 0 auto;}
  .filter-list{display:flex;flex-direction:column;gap:.45em;padding:.1em;}
  .filter-list::-webkit-scrollbar{width:0;}
  .filter-thumb{cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:.22em;flex:0 0 auto;}
  .filter-thumb .fimg{width:2.2em;height:2.2em;border-radius:.55em;background-size:cover;background-position:center;border:2px solid transparent;transition:.15s;}
  .filter-thumb.on .fimg{border-color:var(--accent);box-shadow:0 0 12px rgba(122,168,255,.6);}
  .filter-thumb .flabel{font-size:.68em;color:var(--ink-dim);}
  .filter-thumb.on .flabel{color:#fff;font-weight:600;}

  .qrbox{background:#fff;border-radius:1.1em;padding:.75em;display:inline-flex;flex-direction:column;align-items:center;gap:.5em;box-shadow:0 14px 30px rgba(0,0,0,.4);}
  .qrgen{line-height:0;border-radius:.4em;overflow:hidden;}
  .qrgen img,.qrgen canvas{display:block;}
  .qcap{font-family:"Kanit",sans-serif;font-size:.8em;color:#8b5cf6;font-weight:600;display:flex;align-items:center;gap:.3em;}

  .prog{width:80%;height:.8em;border-radius:999px;background:rgba(255,255,255,.12);overflow:hidden;border:1px solid var(--stroke-soft);}
  .prog b{display:block;height:100%;width:0;border-radius:999px;background:linear-gradient(90deg,var(--accent),#56c8e0);transition:width .2s linear;}
  .spinner{width:3em;height:3em;border-radius:50%;border:.24em solid rgba(255,255,255,.15);border-top-color:var(--accent);animation:spin 1s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}

  .banner{width:100%;border-radius:1em;padding:.8em 1em;font-size:.92em;display:flex;gap:.6em;align-items:flex-start;text-align:left;line-height:1.5;}
  .banner.bad{background:rgba(255,92,122,.16);border:1px solid rgba(255,92,122,.4);color:#ffd4dc;}
  .banner.good{background:rgba(94,234,212,.14);border:1px solid rgba(94,234,212,.4);color:#c8fff2;}
  .banner i{font-size:1.4em;flex:0 0 auto;margin-top:.02em;}

  .idleov{position:absolute;inset:0;z-index:20;display:flex;align-items:center;justify-content:center;padding:1.5em;
    background:rgba(9,9,22,.6);backdrop-filter:blur(12px);animation:fade .25s ease;}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .idlecard{background:rgba(30,24,56,.85);border:1px solid var(--stroke);border-radius:1.6em;padding:1.6em 1.4em;text-align:center;display:flex;flex-direction:column;align-items:center;gap:.8em;max-width:88%;box-shadow:0 24px 60px rgba(0,0,0,.5);}
  .idlering{width:4.4em;height:4.4em;border-radius:50%;display:grid;place-items:center;background:linear-gradient(135deg,#3f74d6,#79b0ff);color:#fff;}
  .idlering span{font-family:"Kanit",sans-serif;font-weight:600;font-size:2em;}

  .fab{position:fixed;bottom:20px;right:20px;z-index:30;width:52px;height:52px;border-radius:50%;border:1px solid var(--stroke);cursor:pointer;
    background:rgba(30,24,56,.8);backdrop-filter:blur(12px);color:var(--accent);font-size:22px;display:grid;place-items:center;box-shadow:0 10px 26px rgba(0,0,0,.4);transition:transform .15s;}
  .fab:hover{transform:scale(1.06) rotate(8deg);}
  .panel{position:fixed;bottom:84px;right:20px;z-index:30;background:rgba(24,20,48,.92);backdrop-filter:blur(18px);border:1px solid var(--stroke);border-radius:20px;padding:16px;width:290px;
    box-shadow:0 24px 60px rgba(0,0,0,.5);display:none;flex-direction:column;gap:14px;}
  .panel.show{display:flex;}
  .panel h4{font-family:"Kanit",sans-serif;font-weight:600;font-size:15px;color:var(--ink);display:flex;align-items:center;gap:6px;}
  .panel .row{display:flex;flex-direction:column;gap:6px;}
  .panel label{font-size:11.5px;color:var(--ink-faint);font-weight:500;}
  .seg{display:inline-flex;padding:4px;border-radius:999px;background:rgba(0,0,0,.3);border:1px solid var(--stroke-soft);}
  .seg button{font-family:inherit;border:0;background:transparent;color:var(--ink-dim);padding:8px 12px;border-radius:999px;cursor:pointer;font-size:12.5px;transition:.15s;flex:1;display:flex;align-items:center;justify-content:center;gap:5px;font-weight:500;}
  .seg button.on{background:rgba(255,255,255,.94);color:#1a1030;font-weight:600;}
  .seg.good button.on{background:var(--mint);color:#053b32;}
  .seg.bad button.on{background:var(--pink);color:#450b1f;}
  .panel .restart{font-family:"Kanit",sans-serif;border:1px solid var(--stroke-soft);background:var(--glass);color:var(--ink);padding:10px;border-radius:12px;cursor:pointer;font-size:13.5px;display:flex;align-items:center;justify-content:center;gap:6px;}
  .panel .restart:hover{background:var(--glass-2);}
</style>
</head>
<body>
<div class="wrap">
  <div class="device portrait" id="device">
    <div class="screen" id="screen">
      <div class="liquid"><span class="b b1"></span><span class="b b2"></span><span class="b b3"></span><span class="b b4"></span><span class="b b5"></span></div>
      <div id="camhost" style="position:absolute;width:2px;height:2px;left:0;top:0;overflow:hidden;opacity:0;pointer-events:none;z-index:0"></div>
      <div class="scr" id="scr"></div>
    </div>
  </div>
</div>

<button class="fab" id="fab" aria-label="ตัวเลือกสำหรับทดสอบ"><i class="ti ti-adjustments-horizontal"></i></button>
<div class="panel" id="panel">
  <h4><i class="ti ti-flask"></i> โหมดทดสอบ (stakeholder)</h4>
  <div class="row"><label>แนวจอ</label>
    <div class="seg" id="segOri"><button data-ori="portrait" class="on">แนวตั้ง</button><button data-ori="landscape">แนวนอน</button></div></div>
  <div class="row"><label>โหมดร้าน</label>
    <div class="seg" id="segMode"><button data-mode="paid" class="on">มีจ่ายเงิน</button><button data-mode="free">ฟรี/event</button></div></div>
  <div class="row"><label>ผลการจ่ายเงิน</label>
    <div class="seg good" id="segPay"><button data-pay="success" class="on">สำเร็จ</button><button data-pay="fail">ไม่สำเร็จ</button></div></div>
  <div class="row"><label>ผลการพิมพ์</label>
    <div class="seg good" id="segPrint"><button data-print="success" class="on">สำเร็จ</button><button data-print="fail">ขัดข้อง</button></div></div>
  <div class="row"><label>Idle timeout</label>
    <div class="seg" id="segIdle"><button data-idle="on" class="on">เปิด</button><button data-idle="off">ปิด</button></div></div>
  <button class="restart" id="btnIdle"><i class="ti ti-clock-pause"></i> จำลอง idle timeout</button>
  <button class="restart" id="btnRestart"><i class="ti ti-refresh"></i> เริ่มใหม่</button>
</div>

<script>
const FRAMES=[
  {id:'s2',name:'2 ช่อง',file:'Frames/Slot-1.2x6 (3 images)-1.svg',W:600,H:1800,slots:[[40,40,520,640],[40,720,520,640]]},
  {id:'s3',name:'3 ช่อง',file:'Frames/Slot-2.2x6 (3 images).svg',W:600,H:1800,slots:[[40,40,520,413.333],[40,493.333,520,413.333],[40,946.667,520,413.333]]},
  {id:'s4',name:'4 ช่อง',file:'Frames/Slot-3.2x6 (4 images).svg',W:600,H:1800,slots:[[40,40,520,300],[40,380,520,300],[40,720,520,300],[40,1060,520,300]]},
  {id:'single',name:'ภาพเดี่ยว',file:'Frames/Slot-4.4x6 (1 images).svg',W:1200,H:1800,slots:[[40,40,1120,1232]]},
  {id:'d2',name:'คู่แนวนอน',file:'Frames/Slot-5.4x6 (2 images).svg',W:1200,H:1800,slots:[[40,40,1120,596],[40,676,1120,596]]},
  {id:'g6',name:'ตาราง 2×3',file:'Frames/Slot-6.4x6 (6 images).svg',W:1200,H:1800,slots:[[40,40,540,384],[620,40,540,384],[40,464,540,384],[620,464,540,384],[40,888,540,384],[620,888,540,384]]}
];
FRAMES.forEach(f=>f.shots=f.slots.length);
const FILTERS=[
  {id:'none',name:'ต้นฉบับ',css:'none'},
  {id:'bw',name:'ขาวดำ',css:'grayscale(1) contrast(1.05)'},
  {id:'vin',name:'วินเทจ',css:'sepia(.5) contrast(1.05) saturate(1.15)'},
  {id:'pop',name:'สดใส',css:'saturate(1.5) brightness(1.06) contrast(1.03)'}
];
const SAMPLE=['https://i.pravatar.cc/500?img=13','https://i.pravatar.cc/500?img=32','https://i.pravatar.cc/500?img=45','https://i.pravatar.cc/500?img=25','https://i.pravatar.cc/500?img=16','https://i.pravatar.cc/500?img=9'];
const PRICE=120;
const JOURNEY=['attract','frame','quantity','pay','getready','capture','preview','confirm','printing','collect'];
const BACK={frame:'attract',quantity:'frame',pay:'quantity'};
const IDLE_STEPS=new Set(['frame','quantity','pay','preview','confirm']);
const IDLE_MS=15000;
const CODE=Math.random().toString(36).slice(2,8).toUpperCase();
const DL='https://bonio.pics/'+CODE;

let S={orientation:'portrait',mode:'paid',payScenario:'success',printScenario:'success',
  step:'attract',frame:null,qty:1,filter:'none',shotIndex:0,shots:[],capPhase:'count',count:3,printError:false,progress:0,idleActive:false,idleMode:'on'};
let timers=[],idleT=null,idleIV=null,idleCount=10,camRAF=null;
let stream=null,videoEl=null,useCam=false,camRequested=false;
const device=document.getElementById('device');
const screenEl=document.getElementById('screen');
const contentEl=document.getElementById('scr');

function clearTimers(){timers.forEach(t=>{clearTimeout(t);clearInterval(t);});timers=[];}
function after(ms,fn){const t=setTimeout(fn,ms);timers.push(t);return t;}
function go(step){S.step=step;render();}
function clock(){const d=new Date();return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');}
function sampleBg(i){return "center/cover url('"+SAMPLE[i%SAMPLE.length]+"')";}

async function initCamera(){
  if(camRequested)return;camRequested=true;
  try{
    if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia)throw 0;
    stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user',width:{ideal:1280},height:{ideal:960}},audio:false});
    videoEl=document.createElement('video');videoEl.className='camvideo';videoEl.autoplay=true;videoEl.muted=true;videoEl.playsInline=true;
    videoEl.setAttribute('playsinline','');videoEl.setAttribute('muted','');videoEl.srcObject=stream;
    const host=document.getElementById('camhost');if(host)host.appendChild(videoEl);
    await videoEl.play().catch(()=>{});useCam=true;
  }catch(e){useCam=false;}
}
function captureFrame(){
  try{const v=videoEl,cw=v.videoWidth||640,ch=v.videoHeight||480,s=Math.min(cw,ch);
    const cv=document.createElement('canvas');cv.width=cv.height=640;const x=cv.getContext('2d');
    x.translate(640,0);x.scale(-1,1);x.drawImage(v,(cw-s)/2,(ch-s)/2,s,s,0,0,640,640);
    return "center/cover url('"+cv.toDataURL('image/jpeg',0.85)+"')";
  }catch(e){return sampleBg(S.shotIndex);}
}

function sizeDevice(){
  const vw=window.innerWidth,vh=window.innerHeight;
  const availH=vh-36,availW=vw-36;
  let w,h;
  if(S.orientation==='portrait'){h=Math.min(availH,960);w=h*0.75;if(w>availW){w=availW;h=w/0.75;}}
  else{w=Math.min(availW,1120);h=w*0.75;if(h>availH){h=availH;w=h/0.75;}}
  device.style.width=Math.round(w)+'px';device.style.height=Math.round(h)+'px';
  const base=Math.max(12,Math.min(22,Math.round(S.orientation==='portrait'?w/27:h/30)));
  screenEl.style.fontSize=base+'px';
}

function chrome(){let idx=JOURNEY.indexOf(S.step);if(S.step==='payproc'||S.step==='payfail')idx=JOURNEY.indexOf('pay');
  const pct=Math.max(0,Math.round(idx/(JOURNEY.length-1)*100));
  const back=BACK[S.step]?`<button class="backbtn" data-act="back" aria-label="ย้อนกลับ"><i class="ti ti-chevron-left"></i></button>`:'';
  return `<div class="scr-prog"><b style="width:${pct}%"></b></div>
  <div class="scr-top"><div class="l">${back}<i class="ti ti-aperture"></i>bonio</div>
  <div class="r"><i class="ti ti-wifi"></i><i class="ti ti-battery-3"></i><span>${clock()}</span></div></div>`;}
function miniLayout(f){let c='';for(let i=0;i<f.shots;i++)c+='<i style="background:'+sampleBg(i)+'"></i>';
  const u=1.35,w=(f.cols*u+0.55).toFixed(2),h=(f.rows*u+0.55).toFixed(2);
  return `<div class="mini" style="width:${w}em;height:${h}em;grid-template-columns:repeat(${f.cols},1fr);grid-template-rows:repeat(${f.rows},1fr)">${c}</div>`;}
function frameArt(f,h){const fil=FILTERS.find(x=>x.id===S.filter).css;const w=(h*f.W/f.H).toFixed(2);
  let ph='';for(let i=0;i<f.slots.length;i++){const s=f.slots[i];
    ph+='<div class="fa-photo" style="left:'+(s[0]/f.W*100).toFixed(3)+'%;top:'+(s[1]/f.H*100).toFixed(3)+'%;width:'+(s[2]/f.W*100).toFixed(3)+'%;height:'+(s[3]/f.H*100).toFixed(3)+'%;background:'+(S.shots[i]||sampleBg(i))+';filter:'+fil+'"></div>';}
  return '<div class="frameart" style="width:'+w+'em;height:'+h+'em;background-image:url(\''+encodeURI(f.file)+'\')">'+ph+'</div>';}
function photoComposite(cellOverride){const f=S.frame,fil=FILTERS.find(x=>x.id===S.filter).css;
  const cell=cellOverride||(f.rows>=4?2.4:(f.rows===3?2.9:3.3));let c='';
  for(let i=0;i<f.shots;i++)c+='<b style="background:'+(S.shots[i]||sampleBg(i))+';filter:'+fil+';width:'+cell+'em;height:'+cell+'em"></b>';
  return '<div class="photo"><div class="cells" style="grid-template-columns:repeat('+f.cols+','+cell+'em);grid-auto-rows:'+cell+'em">'+c+'</div><div class="cap">bonio · '+new Date().toLocaleDateString('th-TH',{day:'2-digit',month:'2-digit',year:'2-digit'})+'</div></div>';}

const STEP={
  attract(){return `<div class="landing" data-act="start">
    <div class="lcenter">
      <div class="touch">แตะเพื่อเริ่ม</div>
      <div class="touch-en">TOUCH TO START</div>
    </div>
    <div class="brandmark">BONIO BOOTH</div>
  </div>`;},

  frame(){if(!S.frame)S.frame=JSON.parse(JSON.stringify(FRAMES[0]));
    const th=S.orientation==='portrait'?6:5;
    let cards='';FRAMES.forEach(f=>{const on=S.frame.id===f.id;cards+=`<div class="fcard2 ${on?'on':''}" data-act="selframe" data-id="${f.id}"><div class="fcheck"><i class="ti ti-check"></i></div><div class="fcard2-art">${frameArt(f,th)}</div><div class="fname">${f.name}</div></div>`;});
    return `<div class="scr-body">
      <div class="scr-main" style="justify-content:flex-start;gap:.6em;padding-top:.4em">
        <div class="h2">เลือกกรอบรูป</div>
        <div class="subcaps">SELECT YOUR FRAME</div>
        <div class="fgrid-wrap"><div class="fgrid">${cards}</div></div>
      </div>
      <div class="scr-cta"><button class="btn primary lg" data-act="framenext">ต่อไป</button></div>
    </div>`;},

  quantity(){const total=S.qty*PRICE,f=S.frame;
    return `<div class="scr-body">
      <div class="scr-main">
        <div class="h2">จำนวนพิมพ์</div>
        ${frameArt(f,7)}
        <div style="display:flex;align-items:center;gap:1.3em">
          <button class="btn" data-act="qtyminus" style="width:2.5em;height:2.5em;padding:0;font-size:1.4em">−</button>
          <div style="font-family:Kanit,sans-serif;font-weight:700;font-size:2.1em;min-width:1.3em;color:#fff;text-shadow:0 2px 16px rgba(0,0,0,.6)">${S.qty}</div>
          <button class="btn" data-act="qtyplus" style="width:2.5em;height:2.5em;padding:0;font-size:1.4em">+</button>
        </div>
        ${S.mode==='paid'?`<div class="pill price"><i class="ti ti-cash"></i> ${total} บาท</div>`:`<div class="pill free"><i class="ti ti-gift"></i> ฟรี</div>`}
      </div>
      <div class="scr-cta"><button class="btn primary lg" data-act="qtynext">${S.mode==='paid'?'ไปจ่ายเงิน':'ไปถ่ายรูป'} <i class="ti ti-arrow-right"></i></button></div>
    </div>`;},

  pay(){const total=S.qty*PRICE;
    return `<div class="scr-body">
      <div class="scr-main">
        <div class="h2">สแกนเพื่อจ่าย</div>
        <div class="qrbox"><div class="qrgen" data-qr="${DL}?pay=${total}"></div><div class="qcap">พร้อมเพย์ · ${total} บาท</div></div>
      </div>
      <div class="scr-cta"><button class="btn ghost" data-act="paycancel">ยกเลิก</button><button class="btn primary lg" data-act="pay"><i class="ti ti-qrcode"></i>จำลองการจ่ายเงิน</button></div>
    </div>`;},

  payproc(){return `<div class="scr-body"><div class="scr-main">
      <div class="spinner"></div>
      <div class="h2">กำลังเช็คยอด</div>
    </div></div>`;},

  payfail(){return `<div class="scr-body">
      <div class="scr-main">
        <div class="hero"><i class="ti ti-alert-triangle" style="font-size:3em;color:var(--pink)"></i></div>
        <div class="h2">จ่ายไม่สำเร็จ</div>
        <div class="banner bad"><i class="ti ti-info-circle"></i><div>ยอดยังไม่เข้า ลองสแกนใหม่ หรือเรียกพนักงานช่วยได้เลย</div></div>
      </div>
      <div class="scr-cta"><button class="btn ghost" data-act="paycancel">ยกเลิก</button><button class="btn primary lg" data-act="payretry"><i class="ti ti-refresh"></i>ลองใหม่</button></div>
    </div>`;},

  getready(){return `<div class="scr-body">
      <div class="scr-main">
        <div class="hero"><i class="ti ti-camera" style="font-size:3em;color:var(--accent)"></i></div>
        <div class="h1">เตรียมโพสท่า</div>
        <div class="sub">${useCam?'มองที่กล้อง':'กำลังเปิดกล้อง…'}</div>
      </div>
      <div class="scr-cta"><button class="btn primary lg" data-act="ready"><i class="ti ti-player-play"></i>พร้อมแล้ว</button></div>
    </div>`;},

  capture(){const f=S.frame;let thumbs='';
    for(let i=0;i<f.shots;i++)thumbs+=`<div class="sthumb ${S.shots[i]?'':'empty'}" style="${S.shots[i]?'background:'+S.shots[i]:''}"></div>`;
    let mid='';
    const previewBg=useCam?'':('background:'+sampleBg(S.shotIndex));
    if(S.capPhase==='count')mid='<div class="cam">'+(useCam?'<div class="camfill" id="camslot"></div>':'<div class="camfill" style="'+previewBg+'"></div>')+'<div class="cambadge"><span class="rec"></span>LIVE</div><div class="countbubble"><span>'+S.count+'</span></div></div>';
    else if(S.capPhase==='flash')mid=`<div class="cam"><div class="camfill" style="background:${S.shots[S.shotIndex]}"></div><div class="flashwhite"></div></div>`;
    else mid=`<div class="cam"><div class="camfill" style="background:${S.shots[S.shotIndex]}"></div><div class="camcheck"><i class="ti ti-check"></i></div></div>`;
    const cta=S.capPhase==='review'?'<button class="btn" data-act="retake"><i class="ti ti-refresh"></i>ถ่ายใหม่</button><button class="btn primary lg" data-act="nextshot">'+(S.shotIndex+1<f.shots?'ช็อตต่อไป':'ดูตัวอย่าง')+' <i class="ti ti-arrow-right"></i></button>':'';
    return `<div class="scr-body">
      <div class="scr-main" style="gap:.6em">
        <div class="pill"><i class="ti ti-camera"></i> ${S.shotIndex+1} / ${f.shots}</div>
        ${mid}
        <div class="shotthumbs">${thumbs}</div>
        ${S.capPhase==='count'?`<div class="sub" style="min-height:1.2em">ยิ้มไว้</div>`:''}
      </div>
      <div class="scr-cta">${cta}</div>
    </div>`;},

  preview(){const src=S.shots[0]||sampleBg(0);let list='';
    FILTERS.forEach(fl=>{list+=`<div class="filter-thumb ${S.filter===fl.id?'on':''}" data-act="filter" data-id="${fl.id}"><div class="fimg" style="background:${src};filter:${fl.css}"></div><div class="flabel">${fl.name}</div></div>`;});
    return `<div class="scr-body">
      <div class="scr-main">
        <div class="h2">แต่งรูปของคุณ</div>
        <div class="preview-wrap">
          <div class="preview-photo">${frameArt(S.frame,S.orientation==='portrait'?23:17.5)}</div>
          <div class="filter-list">${list}</div>
        </div>
      </div>
      <div class="scr-cta"><button class="btn primary lg" data-act="confirm">ใช้รูปนี้ <i class="ti ti-arrow-right"></i></button></div>
    </div>`;},

  confirm(){const total=S.qty*PRICE;
    return `<div class="scr-body">
      <div class="scr-main">
        <div class="h2">ยืนยันสั่งพิมพ์</div>
        ${frameArt(S.frame,S.orientation==='portrait'?18:13)}
        <div class="sub">${S.frame.name} · ${S.qty} ชุด${S.mode==='paid'?' · '+total+' บาท':''}</div>
      </div>
      <div class="scr-cta"><button class="btn ghost" data-act="confirmback">ย้อนกลับ</button><button class="btn primary lg" data-act="print"><i class="ti ti-printer"></i>พิมพ์เลย</button></div>
    </div>`;},

  printing(){return `<div class="scr-body"><div class="scr-main">
      <div class="h2">กำลังพิมพ์</div>
      <div class="prog"><b id="pbar" style="width:${S.progress}%"></b></div>
      <div class="qrbox"><div class="qrgen" data-qr="${DL}"></div><div class="qcap"><i class="ti ti-download"></i> สแกนโหลดได้เลย</div></div>
    </div></div>`;},

  collect(){const err=S.printError;
    return `<div class="scr-body">
      <div class="scr-main">
        <div class="hero"><i class="ti ti-confetti" style="font-size:2.3em;color:var(--accent)"></i></div>
        <div class="h1">${err?'ไฟล์พร้อมแล้ว ขอบคุณที่ใช้บริการ':'พิมพ์เสร็จแล้ว ขอบคุณที่ใช้บริการ'}</div>
        <div class="sub">${err?'เครื่องพิมพ์ขัดข้อง แต่สแกน QR เพื่อเก็บไฟล์ได้เลย':'หยิบรูปที่ช่องด้านล่าง แล้วสแกน QR เพื่อเก็บไฟล์'}</div>
        <div style="display:flex;gap:1.3em;align-items:center;flex-wrap:wrap;justify-content:center">
          ${err?'':frameArt(S.frame,S.orientation==='portrait'?13:10.5)}
          <div class="qrbox"><div class="qrgen" data-qr="${DL}"></div><div class="qcap"><i class="ti ti-download"></i> ดาวน์โหลด</div></div>
        </div>
      </div>
      <div class="scr-cta"><button class="btn primary lg" data-act="finish2"><i class="ti ti-home"></i>กลับหน้าเริ่ม</button></div>
    </div>`;}
};

const AUTO={
  capture(){
    if(S.capPhase==='count')after(850,()=>{if(S.count>1){S.count--;render();}else{S.shots[S.shotIndex]=(useCam&&videoEl)?captureFrame():sampleBg(S.shotIndex);S.capPhase='flash';render();}});
    else if(S.capPhase==='flash')after(300,()=>{S.capPhase='review';render();});
  },
  payproc(){after(1300,()=>go(S.payScenario==='success'?'getready':'payfail'));},
  getready(){after(2200,beginCapture);},
  printing(){S.progress=0;const iv=setInterval(()=>{S.progress+=6+Math.random()*7;
    if(S.progress>=100){S.progress=100;clearInterval(iv);S.printError=(S.printScenario==='fail');after(500,()=>go('collect'));}
    const bar=document.getElementById('pbar');if(bar)bar.style.width=S.progress+'%';},240);timers.push(iv);},
  collect(){if(S.idleMode!=='off')after(45000,resetToAttract);}
};

function beginCapture(){S.shotIndex=0;S.shots=[];S.capPhase='count';S.count=3;go('capture');}
function resetToAttract(){clearIdle();S.step='attract';S.frame=null;S.qty=1;S.filter='none';S.shots=[];S.shotIndex=0;S.printError=false;S.progress=0;render();}

function clearIdle(){clearTimeout(idleT);clearInterval(idleIV);idleT=null;idleIV=null;S.idleActive=false;const o=document.getElementById('idleOv');if(o)o.remove();}
function armIdle(){clearTimeout(idleT);if(S.idleMode==='off')return;if(!IDLE_STEPS.has(S.step))return;idleT=setTimeout(triggerIdle,IDLE_MS);}
function triggerIdle(){
  if(S.idleActive)return;S.idleActive=true;idleCount=10;
  const toPrint=['preview','confirm'].includes(S.step);
  const o=document.createElement('div');o.id='idleOv';o.className='idleov';
  o.innerHTML=`<div class="idlecard"><div class="idlering"><span id="idleNum">${idleCount}</span></div>
    <div class="h2">${toPrint?'กำลังสั่งพิมพ์ให้':'ยังอยู่ไหมคะ?'}</div>
    <div class="sub">${toPrint?'ไม่มีการใช้งาน · จะพิมพ์รูปให้ใน':'จะกลับหน้าเริ่มใน'} <b id="idleNum2">${idleCount}</b> วิ</div>
    <div class="btn-row">${toPrint
      ?'<button class="btn primary lg" data-act="idlestay"><i class="ti ti-arrow-back-up"></i>ขอเลือกต่อ</button><button class="btn ghost" data-act="idleprint">พิมพ์เลย</button>'
      :'<button class="btn primary lg" data-act="idlestay"><i class="ti ti-hand-finger"></i>ยังอยู่ ทำต่อ</button><button class="btn ghost" data-act="idlereset">เริ่มใหม่</button>'}</div>
  </div>`;
  screenEl.appendChild(o);
  idleIV=setInterval(()=>{idleCount--;const a=document.getElementById('idleNum'),b=document.getElementById('idleNum2');
    if(a)a.textContent=idleCount;if(b)b.textContent=idleCount;
    if(idleCount<=0){clearIdle();if(toPrint)go('printing');else resetToAttract();}},1000);
}

function attachCamera(){
  if(!(S.step==='capture'&&S.capPhase==='count'&&useCam&&videoEl))return;
  const slot=document.getElementById('camslot');
  if(slot){slot.appendChild(videoEl);videoEl.play().catch(()=>{});}
}
function attachQR(){
  if(typeof QRCode==='undefined')return;
  const base=parseFloat(screenEl.style.fontSize)||16,px=Math.round(base*7.2);
  document.querySelectorAll('.qrgen').forEach(el=>{const t=el.getAttribute('data-qr');el.innerHTML='';
    try{new QRCode(el,{text:t,width:px,height:px,colorDark:'#1a1030',colorLight:'#ffffff',correctLevel:QRCode.CorrectLevel.M});}catch(e){}});
}

function render(){
  clearTimers();clearIdle();
  device.className='device '+S.orientation;
  sizeDevice();
  contentEl.className=S.step==='attract'?'scr land':'scr';
  contentEl.innerHTML=(S.step==='attract'?'':chrome())+STEP[S.step]();
  attachCamera();attachQR();
  requestAnimationFrame(sizeDevice);
  if(AUTO[S.step])AUTO[S.step]();
  armIdle();
}

screenEl.addEventListener('click',e=>{
  const el=e.target.closest('[data-act]');if(!el)return;
  const act=el.getAttribute('data-act'),id=el.getAttribute('data-id');
  switch(act){
    case 'start':initCamera();go('frame');break;
    case 'selframe':S.frame=JSON.parse(JSON.stringify(FRAMES.find(f=>f.id===id)));render();break;
    case 'framenext':go('quantity');break;
    case 'back':{const b=BACK[S.step];if(b==='attract')resetToAttract();else if(b){S.step=b;render();}}break;
    case 'qtyminus':S.qty=Math.max(1,S.qty-1);render();break;
    case 'qtyplus':S.qty=Math.min(4,S.qty+1);render();break;
    case 'qtynext':go(S.mode==='paid'?'pay':'getready');break;
    case 'pay':go('payproc');break;
    case 'paycancel':resetToAttract();break;
    case 'payretry':go('pay');break;
    case 'ready':beginCapture();break;
    case 'retake':S.capPhase='count';S.count=3;render();break;
    case 'nextshot':if(S.shotIndex+1<S.frame.shots){S.shotIndex++;S.capPhase='count';S.count=3;render();}else go('preview');break;
    case 'filter':S.filter=id;render();break;
    case 'confirm':go('confirm');break;
    case 'confirmback':go('preview');break;
    case 'print':go('printing');break;
    case 'finish2':resetToAttract();break;
    case 'idlestay':clearIdle();armIdle();break;
    case 'idlereset':clearIdle();resetToAttract();break;
    case 'idleprint':clearIdle();go('printing');break;
  }
});
screenEl.addEventListener('pointerdown',()=>{if(!S.idleActive)armIdle();});

function bindSeg(segId,attr,key,cb){document.getElementById(segId).addEventListener('click',e=>{
  const b=e.target.closest('button');if(!b)return;S[key]=b.getAttribute(attr);
  [...b.parentNode.children].forEach(c=>c.classList.remove('on'));b.classList.add('on');if(cb)cb();});}
bindSeg('segOri','data-ori','orientation',()=>render());
bindSeg('segMode','data-mode','mode',()=>{if(['pay','payproc','payfail'].includes(S.step))resetToAttract();else render();});
bindSeg('segPay','data-pay','payScenario');
bindSeg('segPrint','data-print','printScenario');
bindSeg('segIdle','data-idle','idleMode',()=>{if(S.idleMode==='off')clearIdle();else armIdle();});
document.getElementById('btnRestart').addEventListener('click',resetToAttract);
document.getElementById('btnIdle').addEventListener('click',()=>{if(!IDLE_STEPS.has(S.step)){S.step='frame';S.frame=null;render();}setTimeout(triggerIdle,60);});
document.getElementById('fab').addEventListener('click',()=>document.getElementById('panel').classList.toggle('show'));
window.addEventListener('resize',sizeDevice);

render();
</script>
</body>
</html>
